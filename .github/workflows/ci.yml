name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: VetRAG/requirements-lock.txt

      - name: Install dependencies
        working-directory: VetRAG
        run: |
          python -m pip install --upgrade pip
          pip install torch --extra-index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-lock.txt
          pip install mypy bandit

      - name: Ruff check
        working-directory: VetRAG
        run: ruff check .

      - name: Mypy type check
        working-directory: VetRAG
        run: mypy src/ --ignore-missing-imports --no-error-summary

      - name: Bandit security scan
        working-directory: VetRAG
        run: bandit -r src/ -f txt --skip B101

      - name: Run tests
        working-directory: VetRAG
        run: python -m pytest tests/ -v --cov=src --cov-report=term --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: VetRAG/coverage.xml
          retention-days: 7
